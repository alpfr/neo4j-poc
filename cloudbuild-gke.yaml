steps:
  # 1. Build the Streamlit Container Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${COMMIT_SHA}', '.']

  # 2. Push Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${COMMIT_SHA}']

  # 3. Inject Variables into Kubernetes YAML Map
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd kubernetes
        wget https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.0.0/kustomize_v5.0.0_linux_amd64.tar.gz
        tar -xzf kustomize_v5.0.0_linux_amd64.tar.gz
        ./kustomize edit set image FRONTEND_IMAGE_PLACEHOLDER=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${COMMIT_SHA}

  # 4. Deploy Manifests to GKE via Kustomize
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['apply', '-k', 'kubernetes/']
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}'

substitutions:
  _REGION: 'us-central1'
  _REPO_NAME: 'neo4j-poc-repo'
  _CLUSTER_NAME: 'neo4j-gke-cluster'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${COMMIT_SHA}'
