apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-streamlit-egress-to-neo4j
spec:
  podSelector:
    matchLabels:
      app: streamlit
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: neo4j
    ports:
    - protocol: TCP
      port: 7687
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-neo4j-ingress-from-streamlit
spec:
  podSelector:
    matchLabels:
      app: neo4j
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: streamlit
    ports:
    - protocol: TCP
      port: 7687
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-streamlit
spec:
  podSelector:
    matchLabels:
      app: streamlit
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 8501
